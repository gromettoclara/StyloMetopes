abstract: >-
  Cet article présente IEML (*Information Economy MetaLanguage*), un système de
  représentation uniforme de la signification et de la connaissance humaine qui
  peut être lu et traité automatiquement par les machines. Distinguée des
  sémantiques pragmatique et référentielle, la sémantique linguistique est
  aujourd'hui formalisée de manière incomplète. Seule sa dimension syntagmatique
  a été mathématisée sous la forme des langages réguliers. Il restait à
  formaliser sa dimension paradigmatique. Pour résoudre le problème de la
  mathématisation complète du langage, y compris sa dimension paradigmatique, je
  propose de coder le sens linguistique en IEML. IEML a la même capacité
  expressive qu'une langue naturelle et possède une structure algébrique
  permettant le calcul de sa sémantique. L'article explique son dictionnaire, sa
  grammaire formelle et ses outils intégrés de construction de graphes
  sémantiques. Au titre de ses applications, IEML pourrait être le vecteur d'un
  calcul et d'une communication fluide du sens -- l'interopérabilité sémantique
  -- capable de décloisonner la mémoire numérique et de nourrir les progrès de
  l'intelligence collective, de l'intelligence artificielle et des humanités
  numériques. Je conclus en indiquant quelques directions de recherche. Ce texte
  présente la synthèse de plusieurs décennies de recherches.
